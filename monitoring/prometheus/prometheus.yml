global:
  scrape_interval: 20s

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
      # # this works because docker does clever internal DNS routing - scraping localhost is like scraping you>
          - node-exporter:9100

  - job_name: blackbox-http
    metrics_path: /probe

    params:
      module:
        - https_2xx

    static_configs:
      - targets:
          - https://judah.sh

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115
  - job_name: nginx
    static_configs:
     - targets:
         - 172.17.0.1:9113
