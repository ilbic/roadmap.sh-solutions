modules:

  https_2xx:
    prober: http
    timeout: 5s

    http:
      method: GET

      valid_status_codes: [200]

      fail_if_ssl: false

      follow_redirects: true

      preferred_ip_protocol: ip4


  dns_lookup:
    prober: dns
    timeout: 5s

    dns:
      query_name: judah.sh
      query_type: A

      preferred_ip_protocol: ip4


